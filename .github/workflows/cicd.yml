name: Data Processing CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]

jobs:
  # Tahap 1: Continuous Integration (Testing)
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Tarik kode dari repository
        uses: actions/checkout@v3

      - name: Siapkan Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Jalankan Unit Test (Pytest)
        run: |
          pytest tests/ -v

  # Tahap 2: Continuous Deployment (Simulasi)
  deploy-mock:
    needs: build-and-test 
    runs-on: ubuntu-latest
    steps:
      - name: Simulasi Deployment
        run: |
          echo "✅ Semua test lolos!"
          echo "🎉 Proses CI/CD Selesai dengan sukses!"
